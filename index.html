<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexandra &amp; Justin</title>

<style>
  @font-face {
    font-family: 'Konstytucyja';
    src: url('fonts/Konstytucyja.otf') format('opentype');
    font-display: swap;
  }
  @font-face {
    font-family: 'Rothenburg Decorative';
    src: url('fonts/RothenburgDecorative.ttf') format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'Freebooter Script';
    src: url('fonts/FreebooterScript.ttf') format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'Rapscallion';
    src: url('fonts/Rapscallion.ttf') format('truetype');
    font-display: swap;
  }

  :root {
    --primary: #5F1D08;
    --cream: #F3ECE1;
    --ink: #1C1108;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--ink);
    color: var(--cream);
    overflow-x: hidden;
  }

  /* ---------- HOMEPAGE ---------- */
  .homepage {
    position: relative;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }

  .bg {
    position: absolute;
    inset: 0;
    background-image: url('hero.jpg');
    background-size: cover;
    background-position: center bottom;
    filter: grayscale(20%) contrast(1.05) brightness(0.92);
    animation: bgReveal 2.4s ease-out;
  }

  @keyframes bgReveal {
    from { opacity: 0; transform: scale(1.04); }
    to { opacity: 1; transform: scale(1); }
  }

  .scrim-dark {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(15,8,3,0.25) 0%, rgba(15,8,3,0.1) 35%, rgba(15,8,3,0.55) 75%, rgba(15,8,3,0.85) 100%);
  }

  .home-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 2;
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 24px;
    opacity: 0;
    animation: contentIn 1.4s ease-out 0.5s forwards;
  }

  @keyframes contentIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow-line {
    font-family: 'Konstytucyja', serif;
    font-size: clamp(22px, 2.8vw, 34px);
    letter-spacing: 0.03em;
    color: var(--cream);
    margin-bottom: 34px;
  }

  .big-date {
    font-family: 'Rothenburg Decorative', serif;
    font-size: clamp(36px, 6.2vw, 108px);
    line-height: 1;
    color: var(--cream);
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  .scroll-cue {
    position: absolute;
    bottom: 34px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    font-family: 'Konstytucyja', serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: rgba(243,236,225,0.65);
    opacity: 0;
    animation: contentIn 1.4s ease-out 1.2s forwards;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .scroll-cue .chevron {
    display: block;
    width: 14px;
    height: 8px;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(4px); }
  }

  /* ---------- SCROLL PAGE ---------- */
  .scrollpage {
    position: relative;
    min-height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 90px 24px;
    overflow: hidden;
  }

  .bg-light {
    position: absolute;
    inset: 0;
    background-image: url('hero.jpg');
    background-size: cover;
    background-position: center bottom;
    filter: grayscale(35%) contrast(0.95) brightness(1.35);
  }

  .scrim-light {
    position: absolute;
    inset: 0;
    background: rgba(243, 238, 230, 0.72);
  }

  .invite-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 920px;
    width: 100%;
  }

  .fade-up {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 1s ease-out, transform 1s ease-out;
  }
  .fade-up.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  .invite-line {
    font-family: 'Konstytucyja', serif;
    font-size: clamp(18px, 2.4vw, 30px);
    color: var(--primary);
    margin-bottom: 40px;
    letter-spacing: 0.01em;
  }
  .invite-line .script {
    font-family: 'Freebooter Script', cursive;
    font-size: 1.5em;
    margin: 0 0.05em;
  }

  .event-block { margin-bottom: 56px; }
  .event-block:last-of-type { margin-bottom: 44px; }

  .event-name {
    font-family: 'Rothenburg Decorative', serif;
    font-size: clamp(48px, 8vw, 96px);
    line-height: 1;
    color: var(--primary);
    margin-bottom: 14px;
    text-transform: lowercase;
  }

  .event-city {
    font-family: 'Konstytucyja', serif;
    font-size: clamp(20px, 2.6vw, 30px);
    color: var(--primary);
    margin-bottom: 2px;
  }

  .event-date {
    font-family: 'Freebooter Script', cursive;
    font-size: clamp(22px, 3vw, 32px);
    color: var(--primary);
  }

  .coming-soon-line {
    font-family: 'Konstytucyja', serif;
    font-size: clamp(20px, 2.6vw, 28px);
    color: var(--primary);
    letter-spacing: 0.02em;
  }

  @media (max-width: 640px) {
    .event-block { margin-bottom: 40px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .bg, .home-content, .scroll-cue, .fade-up { animation: none !important; opacity: 1 !important; transform: none !important; }
  }
</style>
</head>
<body>

  <!-- ===== HOMEPAGE ===== -->
  <section class="homepage">
    <div class="bg"></div>
    <div class="scrim-dark"></div>

    <div class="home-content">
      <div class="eyebrow-line">the marriage of Alexandra and Justin</div>
      <div class="big-date">September 17<sup style="font-size:0.4em;">th</sup> 2027</div>
    </div>

    <div class="scroll-cue">
      <span>scroll</span>
      <svg class="chevron" viewBox="0 0 14 8" xmlns="http://www.w3.org/2000/svg">
        <polyline points="1,1 7,7 13,1" fill="none" stroke="rgba(243,236,225,0.65)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </section>

  <!-- ===== SCROLL / INVITE PAGE ===== -->
  <section class="scrollpage">
    <div class="bg-light"></div>
    <div class="scrim-light"></div>

    <div class="invite-content">
      <div class="invite-line fade-up">You are cordially invited to <span class="script">Catalonia, Spain</span> to celebrate</div>

      <div class="event-block fade-up">
        <div class="event-name">The Welcome Party</div>
        <div class="event-city">Barcelona</div>
        <div class="event-date">September 15<sup style="font-size:0.6em;">th</sup> 2027</div>
      </div>

      <div class="event-block fade-up">
        <div class="event-name">The Wedding</div>
        <div class="event-city">El Convent de Blanes</div>
        <div class="event-date">September 17<sup style="font-size:0.6em;">th</sup> 2027</div>
      </div>

      <div class="coming-soon-line fade-up">Full website and details coming soon</div>
    </div>
  </section>

<script>
  const fadeEls = document.querySelectorAll('.fade-up');
  fadeEls.forEach((el, i) => {
    el.style.transitionDelay = (i * 0.15) + 's';
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
      }
    });
  }, { threshold: 0.2 });

  fadeEls.forEach((el) => observer.observe(el));

  // "Scroll" cue click jumps to the invite section
  document.querySelector('.scroll-cue').addEventListener('click', () => {
    document.querySelector('.scrollpage').scrollIntoView({ behavior: 'smooth' });
  });
  document.querySelector('.scroll-cue').style.cursor = 'pointer';
</script>

</body>
</html>
