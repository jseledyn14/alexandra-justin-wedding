<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexandra &amp; Justin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Jost:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #5F1D08;
    --primary-light: #8A3E1F;
    --cream: #F3ECE1;
    --cream-dim: rgba(243, 236, 225, 0.72);
    --ink: #1C1108;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--ink);
    color: var(--cream);
    overflow: hidden;
  }

  .frame {
    position: relative;
    height: 100vh;
    width: 100vw;
  }

  .bg {
    position: absolute;
    inset: 0;
    background-image: url('hero.jpg');
    background-size: cover;
    background-position: center 62%;
    filter: grayscale(15%) contrast(1.05) brightness(0.95);
    animation: bgReveal 2.4s ease-out;
  }

  @keyframes bgReveal {
    from { opacity: 0; transform: scale(1.04); }
    to { opacity: 1; transform: scale(1); }
  }

  .scrim {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(20,10,4,0.55) 0%, rgba(20,10,4,0.15) 30%, rgba(20,10,4,0.25) 60%, rgba(20,10,4,0.78) 100%),
      linear-gradient(90deg, rgba(20,10,4,0.35) 0%, rgba(20,10,4,0) 20%, rgba(20,10,4,0) 80%, rgba(20,10,4,0.35) 100%);
  }

  /* vintage postcard inset border */
  .border-frame {
    position: absolute;
    inset: 22px;
    border: 1px solid rgba(243, 236, 225, 0.38);
    pointer-events: none;
  }
  .border-frame::before {
    content: "";
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(243, 236, 225, 0.18);
  }

  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px;
    opacity: 0;
    animation: contentIn 1.4s ease-out 0.5s forwards;
  }

  @keyframes contentIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--cream-dim);
    margin-bottom: 28px;
  }

  .names {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(48px, 9vw, 108px);
    line-height: 1;
    letter-spacing: 0.01em;
    color: var(--cream);
    text-shadow: 0 2px 24px rgba(0,0,0,0.35);
  }

  .amp {
    font-style: italic;
    font-weight: 300;
    color: var(--primary-light);
    margin: 0 0.18em;
    font-size: 0.8em;
  }

  .divider {
    width: 1px;
    height: 44px;
    background: var(--cream-dim);
    margin: 32px 0;
  }

  .date {
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--cream);
  }

  .location {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 19px;
    color: var(--cream-dim);
    margin-top: 10px;
    letter-spacing: 0.02em;
  }

  .coming-soon {
    position: absolute;
    bottom: 48px;
    left: 0;
    right: 0;
    z-index: 2;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 16px;
    letter-spacing: 0.06em;
    color: var(--cream-dim);
    opacity: 0;
    animation: contentIn 1.4s ease-out 1.1s forwards;
  }

  .caption {
    position: absolute;
    bottom: 32px;
    left: 44px;
    z-index: 2;
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cream-dim);
    opacity: 0;
    animation: contentIn 1.4s ease-out 1.1s forwards;
  }

  @media (max-width: 640px) {
    .border-frame { inset: 14px; }
    .caption { display: none; }
    .coming-soon { bottom: 34px; font-size: 14px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .bg, .content, .coming-soon, .caption { animation: none; opacity: 1; }
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="bg"></div>
    <div class="scrim"></div>
    <div class="border-frame"></div>

    <div class="content">
      <div class="eyebrow">We're getting married</div>
      <h1 class="names">Alexandra<span class="amp">&amp;</span>Justin</h1>
      <div class="divider"></div>
      <div class="date">September 17, 2027</div>
      <div class="location">El Convent Blanes &nbsp;·&nbsp; Catalonia, Spain</div>
    </div>

    <div class="caption">El Convent, Blanes — 1959</div>
    <div class="coming-soon">The full site is coming soon</div>
  </div>
</body>
</html>
